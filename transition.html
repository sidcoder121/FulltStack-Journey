<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition</title>
    <style>
        body{
            background-color: darkslategray;
        }
        div{
            height: 600px;
            width:400px;
            background-image: url('https://images.unsplash.com/photo-1598507619174-04d674f7fb95?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MjB8fHJ1c3NpYW58ZW58MHx8MHx8fDA%3D');
            background-size: contain;
            background-color: rgb(179, 30, 30);
            box-shadow: 10px 10px 3px yellow;
            transition-duration: 2s;
            transition-delay: 0.2s;
            transform:translateX(500px)
            
        }

        div:hover{
            background-color: black;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
