<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form action="/action">
        <!-- input - useful for taking input from user
        used to create multiple form controls like text box, radio button, check box, submit button etc. -->
        <p>Enter your name:</p>
        <!-- input type text - used to create a single line text box -->
        <input type="text" placeholder="Enter your name" required>
        <br><br>
        <p>Enter your email:</p>
        <!-- input type email - used to create a single line text box for email input -->
        <input type="email" placeholder="Enter your email" required>
        <br><br>
        <p>Enter your password:</p>
        <!-- input type password - used to create a single line text box for password input -->
        <input type="password" placeholder="Enter your password" required>
        <br><br>
        <p>Enter your age:</p>
        <!-- input type number - used to create a single line text box for number input -->
        <input type="number" placeholder="Enter your age" required>
        <br><br>
        <input type="submit" value="Submit">
    </form>
    
</body>
</html>
