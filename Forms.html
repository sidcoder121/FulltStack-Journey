<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form action="/action">
        <!-- input - useful for taking input from user
        used to create multiple form controls like text box, radio button, check box, submit button etc. -->
       <label>
        <!-- input type text - used to create a single line text box -->
         Username:
        <input type="text" placeholder="Enter your name" required>
        </label>
        <br><br>
        <label>
        Enter your email:
        <!-- input type email - used to create a single line text box for email input -->
        <input type="email" placeholder="Enter your email" required>
        </label>
        <br><br>
        <label>
        Enter your password:
        <!-- input type password - used to create a single line text box for password input -->
        <input type="password" placeholder="Enter your password" required>
        <br><br>
        Enter your age:
        <!-- input type number - used to create a single line text box for number input -->
        <input type="number" placeholder="Enter your age" required>
        </label>
        <br><br>
        <input type="submit" value="Submit">
        <!-- button - used to create a button -->
         <button type="button">Click Me!</button>
        <br><br>
        <!-- button type submit - used to create a submit button -->
        <button type="submit">Submit</button>
        <br><br>
        <!-- button type reset - used to create a reset button -->
        <button type="reset">Reset</button>
        <br><br>
    </form>

    <hr>
    <p>Create a search option that redirects towards google search option using Name Attributes</p>
    <form action = "https://www.google.com/search" method = "get">
        <label for = "search">Search Google:</label>
        <input type = "text" name = "q" id = "search" placeholder = "Enter your search query">
        <input type = "submit" value = "Search">

        <!-- checkbox - used to create a checkbox -->
    <br>
    <input type = "checkbox" name = "age" id = "age" value = "18+">
    <label for = "age" placeholder = "Enter your age">Age:18+</label>

    <div>
        <!-- radio button - used to create a radio button -->
        <input type = "radio" name ="fruit" id = "apple" value = "apple">
        <label for = "apple">Apple</label>
        <input type = "radio" name ="fruit" id = "banana" value = "banana">
        <label for = "banana">Banana</label>
        <input type = "radio" name ="fruit" id = "orange" value = "orange">
        <label for = "orange">Orange</label>
        <br>
        <!-- select - used to create a drop down list -->
        <label for = "country">Select your country:</label>
        <select name = "country" id = "country">
            <option value = "india">India</option>
            <option value = "usa">USA</option>
            <option value = "uk">UK</option>
            <option value = "canada">Canada</option>
        </select>
    </div>
    </form>
    
</body>
</html>
